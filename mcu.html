<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCU Video Conference</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0d0e12;
      --panel-bg: rgba(22, 24, 33, 0.7);
      --panel-border: rgba(255, 255, 255, 0.08);
      --accent-color: #3b82f6;
      --accent-hover: #2563eb;
      --danger-color: #ef4444;
      --danger-hover: #dc2626;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --success-color: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at center, #1e202c 0%, #0d0e12 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Top Navigation / Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--panel-border);
      background: rgba(13, 14, 18, 0.5);
      z-index: 10;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-dot {
      width: 12px;
      height: 12px;
      background-color: var(--accent-color);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-color);
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.025em;
    }

    .status-container {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--panel-border);
    }

    .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--text-muted);
    }

    .status-indicator.connected {
      background-color: var(--success-color);
      box-shadow: 0 0 8px var(--success-color);
      animation: pulse 2s infinite;
    }

    .recording-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger-color);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      animation: blink 1.5s infinite alternate;
    }

    /* Main Video Arena */
    main {
      flex: 1;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .video-container {
      position: relative;
      width: 100%;
      max-width: 1200px;
      aspect-ratio: 16/9;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(12px);
    }

    #remoteVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .video-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      text-align: center;
    }

    .video-placeholder svg {
      width: 64px;
      height: 64px;
      stroke: var(--text-muted);
      stroke-width: 1.5;
      fill: none;
    }

    /* Floating Local Preview PIP */
    .local-preview-card {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      width: 240px;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
      background: #000;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 5;
    }

    .local-preview-card:hover {
      transform: scale(1.05);
      border-color: var(--accent-color);
    }

    #localVideo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror webcam */
    }

    .local-label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
    }

    /* Bottom Control Bar */
    footer {
      padding: 1.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(13, 14, 18, 0.85);
      border-top: 1px solid var(--panel-border);
      backdrop-filter: blur(20px);
      z-index: 10;
    }

    .controls-wrapper {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      color: #fff;
      transition: all 0.2s ease;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    .btn-join {
      background: var(--accent-color);
      width: auto;
      padding: 0 2rem;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1rem;
      gap: 0.5rem;
    }

    .btn-join:hover {
      background: var(--accent-hover);
    }

    .btn-toggle.disabled {
      background: var(--danger-color);
    }

    .btn-toggle.disabled:hover {
      background: var(--danger-hover);
    }

    /* Animations */
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.5; }
    }

    @keyframes blink {
      0% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    @media (max-width: 768px) {
      main { padding: 1rem; }
      .local-preview-card {
        width: 150px;
        bottom: 1rem;
        right: 1rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo-dot"></div>
      <h1>GStreamer MCU</h1>
    </div>
    <div class="status-container">
      <div class="recording-badge" id="recordingBadge" style="display: none;">
        <span style="display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--danger-color)"></span>
        MIXER RECORDING ACTIVE
      </div>
      <div class="status-badge">
        <span class="status-indicator" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
      </div>
      <div class="status-badge" id="peerIdBadge" style="display: none;">
        ID: <span id="peerIdVal" style="font-weight:600"></span>
      </div>
    </div>
  </header>

  <main>
    <div class="video-container">
      <!-- Remote mixed conference stream -->
      <video id="remoteVideo" autoplay playsinline></video>

      <!-- Video Placeholder before joining -->
      <div class="video-placeholder" id="placeholder">
        <svg viewBox="0 0 24 24">
          <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z" />
          <path d="M3 6a2 2 0 012-2h8a2 2 0 012 2v12a2 2 0 01-2 2H5a2 2 0 01-2-2V6z" />
        </svg>
        <h3>MCU Conference Feed</h3>
        <p>Click "Join Conference" below to connect your webcam & start mixing</p>
      </div>
    </div>

    <!-- Local Preview PIP (only shown when camera active) -->
    <div class="local-preview-card" id="localCard" style="display: none;">
      <video id="localVideo" autoplay playsinline muted></video>
      <div class="local-label">You (Local)</div>
    </div>
  </main>

  <footer>
    <div class="controls-wrapper">
      <button class="btn btn-toggle" id="btnMuteVideo" title="Toggle Camera" disabled>
        <!-- Camera Icon -->
        <svg viewBox="0 0 24 24" id="iconVideoOn"><path d="M16 16v-8l5-4v16l-5-4zm-2 2H2V6h12v12z"/></svg>
      </button>
      
      <button class="btn btn-join" id="btnJoin">
        <!-- Join Icon -->
        <svg viewBox="0 0 24 24" style="width:20px;height:20px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        Join Conference
      </button>

      <button class="btn btn-toggle" id="btnMuteAudio" title="Toggle Mic" disabled>
        <!-- Mic Icon -->
        <svg viewBox="0 0 24 24" id="iconAudioOn"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.2 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
      </button>
    </div>
  </footer>

  <script>
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const peerIdBadge = document.getElementById('peerIdBadge');
    const peerIdVal = document.getElementById('peerIdVal');
    const recordingBadge = document.getElementById('recordingBadge');
    
    const remoteVideo = document.getElementById('remoteVideo');
    const localVideo = document.getElementById('localVideo');
    const localCard = document.getElementById('localCard');
    const placeholder = document.getElementById('placeholder');
    
    const btnJoin = document.getElementById('btnJoin');
    const btnMuteVideo = document.getElementById('btnMuteVideo');
    const btnMuteAudio = document.getElementById('btnMuteAudio');

    let ws = null;
    let pc = null;
    let localStream = null;
    let peerId = null;

    // Connect to signaling server
    function connectSignaling() {
      ws = new WebSocket('ws://' + window.location.hostname + ':8888');
      
      ws.onopen = () => {
        statusDot.className = 'status-indicator connected';
        statusText.textContent = 'Signaling Connected';
      };

      ws.onclose = () => {
        statusDot.className = 'status-indicator';
        statusText.textContent = 'Disconnected';
        peerIdBadge.style.display = 'none';
        recordingBadge.style.display = 'none';
        resetUI();
      };

      ws.onmessage = async (e) => {
        const msg = JSON.parse(e.data);

        if (msg.type === 'init') {
          peerId = msg.peer_id;
          peerIdVal.textContent = peerId;
          peerIdBadge.style.display = 'flex';
          console.log('Registered Peer ID:', peerId);
        } else if (msg.sdp) {
          console.log('Received Remote SDP Offer:', msg.sdp);
          await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
          
          if (msg.sdp.type === 'offer') {
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            console.log('Sending SDP Answer:', pc.localDescription);
            ws.send(JSON.stringify({ sdp: pc.localDescription }));
            recordingBadge.style.display = 'flex';
          }
        } else if (msg.candidate) {
          console.log('Received Remote ICE Candidate:', msg.candidate);
          try {
            await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
          } catch (err) {
            console.error('Error adding ICE candidate:', err);
          }
        }
      };
    }

    async function startConference() {
      try {
        btnJoin.disabled = true;
        btnJoin.innerHTML = 'Connecting...';

        // 1. Get webcam & mic tracks
        localStream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 640, height: 360, frameRate: 30 }, 
          audio: true 
        });
        
        localVideo.srcObject = localStream;
        localCard.style.display = 'block';

        // Enable mute toggle buttons
        btnMuteVideo.disabled = false;
        btnMuteAudio.disabled = false;

        // 2. Initialize RTCPeerConnection
        pc = new RTCPeerConnection({
          iceServers: [
            { urls: 'stun:stun.l.google.com:19302' }
          ]
        });

        // 3. Setup track handlers
        pc.ontrack = (event) => {
          console.log('Received mixed remote track:', event.streams);
          if (remoteVideo.srcObject !== event.streams[0]) {
            remoteVideo.srcObject = event.streams[0];
            remoteVideo.style.display = 'block';
            placeholder.style.display = 'none';
          }
        };

        pc.onicecandidate = (event) => {
          if (event.candidate) {
            console.log('Sending Local ICE Candidate:', event.candidate);
            ws.send(JSON.stringify({ candidate: event.candidate }));
          }
        };

        // 4. Add local tracks to PeerConnection
        localStream.getTracks().forEach((track) => {
          pc.addTrack(track, localStream);
        });

        // 5. Notify signaling server that we are ready to receive offer from GStreamer
        ws.send(JSON.stringify({ type: 'ready' }));

        btnJoin.innerHTML = 'Disconnect';
        btnJoin.style.background = 'var(--danger-color)';
        btnJoin.onclick = leaveConference;

      } catch (err) {
        console.error('Failed to join conference:', err);
        alert('Could not access camera/microphone or connect. Check permissions.');
        resetUI();
      }
    }

    function leaveConference() {
      if (ws) ws.close();
      resetUI();
      // Reconnect signaling automatically
      connectSignaling();
    }

    function resetUI() {
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      if (pc) {
        pc.close();
        pc = null;
      }
      remoteVideo.srcObject = null;
      remoteVideo.style.display = 'none';
      localVideo.srcObject = null;
      localCard.style.display = 'none';
      placeholder.style.display = 'flex';
      recordingBadge.style.display = 'none';

      btnJoin.disabled = false;
      btnJoin.innerHTML = '<svg viewBox="0 0 24 24" style="width:20px;height:20px"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg> Join Conference';
      btnJoin.style.background = 'var(--accent-color)';
      btnJoin.onclick = startConference;

      btnMuteVideo.disabled = true;
      btnMuteVideo.className = 'btn btn-toggle';
      btnMuteAudio.disabled = true;
      btnMuteAudio.className = 'btn btn-toggle';
    }

    // Toggle Track Controls
    btnMuteVideo.onclick = () => {
      const videoTrack = localStream.getVideoTracks()[0];
      if (videoTrack) {
        videoTrack.enabled = !videoTrack.enabled;
        btnMuteVideo.classList.toggle('disabled', !videoTrack.enabled);
      }
    };

    btnMuteAudio.onclick = () => {
      const audioTrack = localStream.getAudioTracks()[0];
      if (audioTrack) {
        audioTrack.enabled = !audioTrack.enabled;
        btnMuteAudio.classList.toggle('disabled', !audioTrack.enabled);
      }
    };

    // Initialize
    btnJoin.onclick = startConference;
    connectSignaling();
  </script>
</body>
</html>
