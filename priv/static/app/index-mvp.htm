<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VKZ Ukrainian Court - Video Conference</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f121d;
            --panel-bg: rgba(22, 28, 45, 0.65);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-accent: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(15, 18, 29, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .logo-section h1 {
            font-size: 1.4rem;
            font-weight: 800;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .logo-section p {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 300;
        }

        .court-badge {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            flex: 1;
            height: calc(100vh - 73px);
            overflow: hidden;
        }

        .video-container-wrapper {
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            overflow-y: auto;
            position: relative;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.2rem;
            flex: 1;
        }

        .video-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 16/9;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .video-card:hover {
            transform: translateY(-2px);
            border-color: rgba(59, 130, 246, 0.2);
        }

        .video-card video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .participant-overlay {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(15, 18, 29, 0.75);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .participant-status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-success);
            border-radius: 50%;
            display: inline-block;
        }

        .sidebar {
            background: rgba(15, 18, 29, 0.5);
            border-left: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-tabs {
            display: flex;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 1.1rem;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            color: var(--primary-accent);
            border-bottom: 2px solid var(--primary-accent);
            background: rgba(59, 130, 246, 0.03);
        }

        .chat-section {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .messages-list {
            flex: 1;
            padding: 1.2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message-bubble {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            max-width: 85%;
        }

        .message-header {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--primary-accent);
            margin-bottom: 0.3rem;
            display: flex;
            justify-content: space-between;
        }

        .message-text {
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .chat-input-wrapper {
            padding: 1rem;
            border-top: 1px solid var(--border-color);
            background: rgba(15, 18, 29, 0.8);
        }

        .chat-input-row {
            display: flex;
            gap: 0.6rem;
        }

        .chat-input {
            flex: 1;
            background: rgba(22, 28, 45, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.7rem 1rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .chat-input:focus {
            border-color: var(--primary-accent);
        }

        .send-btn {
            background: var(--primary-accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.7rem 1.2rem;
            font-family: inherit;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .send-btn:hover {
            background-color: #2563eb;
        }

        .telemetry-dashboard {
            padding: 1.2rem;
            background: rgba(22, 28, 45, 0.5);
            border-bottom: 1px solid var(--border-color);
        }

        .telemetry-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .telemetry-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .telemetry-metric {
            background: rgba(15, 18, 29, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 0.6rem 0.8rem;
        }

        .metric-label {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .metric-value {
            font-size: 1.1rem;
            font-weight: 800;
            margin-top: 0.2rem;
            font-family: monospace;
        }

        .status-ok { color: var(--accent-success); }
        .status-warn { color: var(--accent-warning); }

        .control-bar {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 1rem;
            background: rgba(15, 18, 29, 0.95);
            border: 1px solid var(--border-color);
            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
        }

        .control-btn.active {
            background: var(--primary-accent);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .control-btn.decline {
            background: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .control-btn.decline:hover {
            background-color: #dc2626;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section">
            <h1>УАК ВЗ</h1>
            <p>Відеоконференцзв'язов моноліт</p>
        </div>
        <div class="court-badge">Засідання №8324-2026</div>
    </header>

    <div class="main-layout">
        <div class="video-container-wrapper">
            <div class="video-grid" id="videoGrid">
                <div class="video-card">
                    <video id="localVideo" autoplay muted playsinline></video>
                    <div class="participant-overlay">
                        <span class="participant-status-dot"></span>
                        Суддя (Ви)
                    </div>
                </div>
            </div>

            <div class="control-bar">
                <button class="control-btn active" id="micBtn">🎙️</button>
                <button class="control-btn active" id="camBtn">📹</button>
                <button class="control-btn" id="shareBtn">🖥️</button>
                <button class="control-btn decline" id="endBtn">❌</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="telemetry-dashboard">
                <div class="telemetry-title">
                    <span>Мережева Телеметрія</span>
                    <span style="font-size: 0.65rem; padding: 0.1rem 0.4rem; border-radius: 4px; background: rgba(59, 130, 246, 0.15); color: #60a5fa;">QoS Priority EF</span>
                </div>
                <div class="telemetry-grid">
                    <div class="telemetry-metric">
                        <div class="metric-label">RTT затримка</div>
                        <div class="metric-value status-ok" id="rttVal">0 ms</div>
                    </div>
                    <div class="telemetry-metric">
                        <div class="metric-label">Втрати пакетів</div>
                        <div class="metric-value status-ok" id="lossVal">0.00%</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-tabs">
                <button class="tab-btn active">Чат кімнати</button>
                <button class="tab-btn">Учасники (3)</button>
            </div>

            <div class="chat-section">
                <div class="messages-list" id="messagesList">
                    <div class="message-bubble">
                        <div class="message-header">
                            <span>Секретар засідання</span>
                            <span>10:14</span>
                        </div>
                        <div class="message-text">Всі учасники справи підключені до судового залу. Камера ввімкнена.</div>
                    </div>
                </div>
                <div class="chat-input-wrapper">
                    <div class="chat-input-row">
                        <input type="text" class="chat-input" id="chatInput" placeholder="Введіть повідомлення...">
                        <button class="send-btn" id="sendBtn">Надіслати</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="telemetry.js"></script>
    <script src="client.js"></script>
</body>
</html>
