<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Room Dashboard - GStreamer MCU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/rtp.css" />
</head>
<body>
    <header class="app-header">
        <div class="brand-title">
            <div class="brand-dot"></div>
            <span>GStreamer MCU Room</span>
        </div>
        <span id="heading" style="font-weight: 600;"></span>
        <nav class="app-menu">
            <span id="logout"></span>
        </nav>
    </header>

    <main class="app-container" style="flex: 1; display: flex; flex-direction: column;">
        <div class="conference-layout">
            <!-- MCU Mixed Feed — full area, single video from GStreamer compositor -->
            <div class="video-section">
                <div style="position: relative; flex: 1; background: #000; border-radius: 12px; overflow: hidden;">
                    <video id="remoteVideo" autoplay playsinline
                           style="width:100%; height:100%; object-fit:cover; display:block;"></video>

                    <!-- Status badge -->
                    <div id="streamLabel"
                         style="position:absolute; top:12px; left:12px;
                                background:rgba(0,0,0,0.6); color:#fff;
                                font-size:0.75rem; padding:4px 12px;
                                border-radius:20px; letter-spacing:0.03em;">
                        ⬛ Waiting for MCU feed…
                    </div>

                    <!-- Local PiP (your own camera, small, bottom-right) -->
                    <video id="localVideo" autoplay playsinline muted
                           style="position:absolute; bottom:16px; right:16px;
                                  width:160px; aspect-ratio:16/9;
                                  object-fit:cover; border-radius:8px;
                                  border:2px solid var(--accent-color);
                                  transform:scaleX(-1); display:none;"></video>
                </div>

                <!-- Controls -->
                <div class="video-controls">
                    <button class="btn-control" id="btnMuteVideo" title="Mute Video" disabled>
                        <svg viewBox="0 0 24 24"><path d="M16 16v-8l5-4v16l-5-4zm-2 2H2V6h12v12z"/></svg>
                    </button>
                    <button class="btn-primary" id="btnJoin"
                            style="width:auto; padding:0 2rem; margin:0;
                                   display:inline-flex; align-items:center;
                                   gap:0.5rem; border-radius:9999px;">
                        Join Conference
                    </button>
                    <button class="btn-control" id="btnMuteAudio" title="Mute Mic" disabled>
                        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.3-3c0 3-2.54 5.1-5.3 5.1S6.7 14 6.7 11H5c0 3.42 2.72 6.2 6 6.72V21h2v-3.28c3.28-.48 6-3.3 6-6.72h-1.7z"/></svg>
                    </button>
                </div>
            </div>



            <!-- Chat & Users sidebar -->
            <div class="panel-sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">Active Members</div>
                    <div class="users-list" id="membersList">
                        <div class="user-item">
                            <div class="user-status"></div>
                            <span id="currentUserSpan">Connecting...</span>
                        </div>
                    </div>
                </div>

                <div class="sidebar-section chat-section">
                    <div class="sidebar-title">Room Chat</div>
                    <div class="chat-history" id="history">
                        <!-- Messages inserted dynamically here -->
                    </div>
                    <div class="chat-input-wrapper">
                        <input id="message" type="text" placeholder="Type message..." />
                        <span id="send"></span>
                    </div>
                </div>

                <div class="sidebar-section" style="border-top: 1px solid var(--border-color); padding-top: 1rem;">
                    <div id="recording_info" style="font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.75rem; word-break: break-all;"></div>
                    <span id="terminate"></span>
                </div>
            </div>
        </div>
    </main>

    <!-- N2O / NITRO Scripts -->
    <script src="https://ws.n2o.dev/priv/utf8.js"></script>
    <script src="https://ws.n2o.dev/priv/bert.js"></script>
    <script src="https://ws.n2o.dev/priv/heart.js"></script>
    <script src="https://ws.n2o.dev/priv/n2o.js"></script>
    <script>host = location.hostname; port = 8001; debug = true;</script>
    <script src="https://ws.n2o.dev/priv/ftp.js"></script>
    <script src="https://nitro.n2o.dev/priv/js/nitro.js"></script>
    <script>protos = [$bert]; N2O_start();</script>

    <!-- WebRTC composite / signaling script -->
    <script>
        // Room/user survive F5: URL params take priority, localStorage as fallback.
        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room')
                      || localStorage.getItem('rtp_room')
                      || 'lobby';
        const userName = urlParams.get('user')
                      || localStorage.getItem('rtp_user')
                      || 'guest';

        // Persist so F5 without URL params still knows who/where we are
        localStorage.setItem('rtp_room', roomName);
        localStorage.setItem('rtp_user', userName);

        // Keep URL in sync (makes sharing/bookmarking work)
        if (!urlParams.get('room') || !urlParams.get('user')) {
            const next = new URL(window.location.href);
            next.searchParams.set('room', roomName);
            next.searchParams.set('user', userName);
            history.replaceState(null, '', next.toString());
        }

        document.getElementById('currentUserSpan').textContent = userName + ' (You)';


        const remoteVideo = document.getElementById('remoteVideo');
        const localVideo  = document.getElementById('localVideo');
        const btnJoin      = document.getElementById('btnJoin');
        const btnMuteVideo = document.getElementById('btnMuteVideo');
        const btnMuteAudio = document.getElementById('btnMuteAudio');

        let ws          = null;
        let pc          = null;
        let localStream = null;
        let peerId      = null;
        // Persisted join state: true if user was joined before F5, false if they explicitly disconnected
        let autoJoin    = localStorage.getItem('rtp_joined') === 'true';

        function connectSignaling() {
            // Connect to signaling websocket using fallback auth query params
            ws = new WebSocket('ws://' + window.location.hostname + ':8001/ws/signaling?room=' + encodeURIComponent(roomName) + '&user=' + encodeURIComponent(userName));
            
            ws.onopen = () => {
                if (autoJoin) {
                    console.log('Signaling connected — auto-joining conference');
                    startConference();
                } else {
                    console.log('Signaling connected — standing by (Disconnect was pressed)');
                }
            };

            ws.onclose = () => {
                console.log('WebRTC Signaling disconnected');
                resetWebRTC();
            };

            ws.onmessage = async (e) => {
                const msg = JSON.parse(e.data);
                console.log('WebRTC signaling msg:', msg);

                if (msg.type === 'init') {
                    peerId = msg.peer_id;
                    console.log('My Peer ID:', peerId);
                } else if (msg.sdp) {
                    await pc.setRemoteDescription(new RTCSessionDescription(msg.sdp));
                    if (msg.sdp.type === 'offer') {
                        const answer = await pc.createAnswer();
                        await pc.setLocalDescription(answer);
                        ws.send(JSON.stringify({ sdp: pc.localDescription }));
                    }
                } else if (msg.candidate) {
                    try {
                        await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
                    } catch (err) {
                        console.error('Error adding ICE candidate:', err);
                    }
                }
            };
        }

        async function startConference() {
            try {
                autoJoin = true;
                localStorage.setItem('rtp_joined', 'true');  // remember: user is joined
                btnJoin.disabled = true;
                btnJoin.textContent = 'Connecting...';

                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 360, frameRate: 30 }, 
                    audio: true 
                });
                
                localVideo.srcObject = localStream;
                localVideo.style.display = 'block';

                btnMuteVideo.disabled = false;
                btnMuteAudio.disabled = false;

                pc = new RTCPeerConnection({
                    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
                });

                pc.ontrack = (event) => {
                    let stream = event.streams[0];
                    if (!stream) {
                        if (!remoteVideo.srcObject) remoteVideo.srcObject = new MediaStream();
                        remoteVideo.srcObject.addTrack(event.track);
                    } else {
                        if (remoteVideo.srcObject !== stream) remoteVideo.srcObject = stream;
                    }
                    document.getElementById('streamLabel').textContent = '🔴 Live — GStreamer MCU Mixed Feed';
                };

                pc.onicecandidate = (event) => {
                    if (event.candidate) ws.send(JSON.stringify({ candidate: event.candidate }));
                };

                localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));

                ws.send(JSON.stringify({ type: 'ready' }));

                btnJoin.textContent = 'Disconnect';
                btnJoin.style.background = 'var(--danger-color)';
                btnJoin.onclick = leaveConference;
                btnJoin.disabled = false;

            } catch (err) {
                console.error('Join failed:', err);
                alert('Webcam/Mic access denied or connection issue: ' + err.message);
                resetWebRTC();
            }
        }

        function leaveConference() {
            autoJoin = false;
            localStorage.removeItem('rtp_joined');  // F5 after Disconnect → stays disconnected
            localStorage.removeItem('rtp_room');
            localStorage.removeItem('rtp_user');
            if (ws) ws.close();
            resetWebRTC();
            connectSignaling();
        }

        function resetWebRTC() {
            if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
            if (pc) { pc.close(); pc = null; }
            remoteVideo.srcObject = null;
            localVideo.srcObject = null;
            localVideo.style.display = 'none';
            document.getElementById('streamLabel').textContent = '⬛ Waiting for MCU feed…';

            btnJoin.disabled = false;
            btnJoin.textContent = 'Join Conference';
            btnJoin.style.background = 'var(--accent-color)';
            btnJoin.onclick = startConference;

            btnMuteVideo.disabled = true;
            btnMuteVideo.className = 'btn-control';
            btnMuteAudio.disabled = true;
            btnMuteAudio.className = 'btn-control';
        }

        btnMuteVideo.onclick = () => {
            const videoTrack = localStream.getVideoTracks()[0];
            if (videoTrack) {
                videoTrack.enabled = !videoTrack.enabled;
                btnMuteVideo.classList.toggle('active', !videoTrack.enabled);
            }
        };

        btnMuteAudio.onclick = () => {
            const audioTrack = localStream.getAudioTracks()[0];
            if (audioTrack) {
                audioTrack.enabled = !audioTrack.enabled;
                btnMuteAudio.classList.toggle('active', !audioTrack.enabled);
            }
        };

        // btnJoin is now a manual override (auto-join fires via ws.onopen)
        btnJoin.onclick = startConference;
        connectSignaling();
    </script>
</body>
</html>
